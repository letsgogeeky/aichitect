name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "CODE_OF_CONDUCT"
      - ".github/ISSUE_TEMPLATE/**"
      - ".vscode/**"
      - ".editorconfig"
      - ".prettierrc*"
      - ".prettierignore"
      - "public/llms.txt"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "CODE_OF_CONDUCT"
      - ".github/ISSUE_TEMPLATE/**"
      - ".vscode/**"
      - ".editorconfig"
      - ".prettierrc*"
      - ".prettierignore"
      - "public/llms.txt"

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint
        run: npx eslint .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

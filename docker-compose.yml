services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: aichitect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aichitect"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules # prevent host node_modules from overriding container's
      - /app/.next # persist Next.js build cache across restarts
    environment:
      - NODE_ENV=development
    env_file:
      - path: .env.local
        required: false
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
